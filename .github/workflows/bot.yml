name: Bale YouTube Bot

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  poll-and-download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create empty offset file if not exists
        run: |
          if [ ! -f last_update_id.txt ]; then
            echo "0" > last_update_id.txt
          fi

      - name: Download previous offset (optional)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: bot-state
          path: ./

      - name: Install dependencies
        run: |
          pip install yt-dlp requests
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run bot
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: python bot.py

      - name: Upload offset for next run
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-state
          path: last_update_id.txt
          retention-days: 1
